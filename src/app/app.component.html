<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Not Found </title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:#fff;
overflow:hidden;
}

/* stars background */

.stars{
position:absolute;
width:100%;
height:200%;
background:url('https://www.transparenttextures.com/patterns/stardust.png');
opacity:0.2;
animation:moveStars 80s linear infinite;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

.container{
text-align:center;
z-index:2;
}

.error{
font-size:160px;
font-weight:700;
letter-spacing:8px;
}

.line{
width:100px;
height:2px;
background:#444;
margin:25px auto;
}

.title{
font-size:26px;
letter-spacing:3px;
margin-bottom:10px;
}

.desc{
font-size:15px;
color:#9b9b9b;
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="container">

<div class="error">404</div>

<div class="line"></div>

<div class="title">NOT FOUND</div>


</div>

</body>
</html>
